version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: appforge_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: appforge
      POSTGRES_USER: appforge
      POSTGRES_PASSWORD: appforge_dev_password
    ports:
      - "5432:5432"
    volumes:
      - appforge_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: appforge_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      NODE_ENV: production
      DATABASE_URL: postgresql://appforge:appforge_dev_password@postgres:5432/appforge
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_please}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      # Firebase (set in .env)
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      # Email
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      # GitHub
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: appforge_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  appforge_pgdata:
